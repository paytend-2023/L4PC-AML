services:
  postgres:
    image: public.ecr.aws/docker/library/postgres:16
    container_name: paytend-db-test
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: l4pc_aml
      POSTGRES_USER: aml
      POSTGRES_PASSWORD: aml
    command:
      - -c
      - max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aml -d l4pc_aml"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
